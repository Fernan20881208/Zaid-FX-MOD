name: Build Android64

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Geode mod
        id: build
        continue-on-error: true
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: given
          cli: latest
          target: Android64
          build-config: Release
          export-symbols: false

      - name: Capture failed build diagnostics
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          set +e
          : > build-diagnostics.log
          mapfile -t CACHES < <(find . -type f -name CMakeCache.txt -print)
          printf 'Configured CMake trees:\n' >> build-diagnostics.log
          printf '%s\n' "${CACHES[@]}" >> build-diagnostics.log
          STATUS=1
          for CACHE in "${CACHES[@]}"; do
            BUILD_DIR="$(dirname "$CACHE")"
            printf '\n===== cmake --build %s =====\n' "$BUILD_DIR" >> build-diagnostics.log
            cmake --build "$BUILD_DIR" --config Release --parallel 2 >> build-diagnostics.log 2>&1
            CURRENT=$?
            if [ "$CURRENT" -eq 0 ]; then
              STATUS=0
            fi
          done
          echo "diagnostic-build-status=$STATUS" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Upload build diagnostics
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: Zaid-FX-MOD-build-diagnostics
          path: build-diagnostics.log
          if-no-files-found: error

      - name: Fail after diagnostics
        if: steps.build.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Upload package
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: Zaid-FX-MOD-Android64
          path: ${{ steps.build.outputs.build-output }}/*.geode
          if-no-files-found: error

      - name: Publish versioned release
        if: steps.build.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="$(jq -r '.version' mod.json)"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; skipping."
            exit 0
          fi

          gh release create "$VERSION" \
            "${{ steps.build.outputs.build-output }}"/*.geode \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Zaid-FX-MOD $VERSION" \
            --notes-file changelog.md \
            --latest
