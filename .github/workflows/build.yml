name: Build Android64

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Geode mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: given
          cli: latest
          target: Android64
          build-config: Release
          export-symbols: false

      - name: Capture configure and compiler diagnostics
        if: failure()
        continue-on-error: true
        shell: bash
        run: |
          {
            echo "GEODE_SDK=${GEODE_SDK:-unset}"
            echo "ANDROID_NDK_LATEST_HOME=${ANDROID_NDK_LATEST_HOME:-unset}"
            echo "Repository files:"
            find . -maxdepth 2 -type f | sort
          } > diagnostics.txt

          cmake -S . -B build-diagnostic -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_STL=c++_shared \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DGEODE_CODEGEN_CMAKE_ARGS="-DCMAKE_C_COMPILER=clang;-DCMAKE_CXX_COMPILER=clang++;-G Ninja" \
            -DGEODE_DONT_INSTALL_MODS=ON \
            -DGEODE_TARGET_PLATFORM=Android64 \
            2>&1 | tee configure.log

          cmake --build build-diagnostic --config Release --parallel \
            2>&1 | tee build.log

      - name: Upload package
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: Zaid-FX-MOD-Android64
          path: ${{ steps.build.outputs.build-output }}/*.geode
          if-no-files-found: error

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Zaid-FX-MOD-build-logs
          path: |
            diagnostics.txt
            configure.log
            build.log
          if-no-files-found: warn
