name: Build Android64

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Geode mod
        id: build
        continue-on-error: true
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: given
          cli: latest
          target: Android64
          build-config: Release
          export-symbols: false

      - name: Capture failed build diagnostics
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          set +e
          : > build-diagnostics.log
          printf '===== cached Android CMake configuration =====\n' >> build-diagnostics.log
          cmake -S . -B build >> build-diagnostics.log 2>&1
          CONFIGURE_STATUS=$?
          printf '\nconfigure-status=%s\n' "$CONFIGURE_STATUS" >> build-diagnostics.log
          if [ "$CONFIGURE_STATUS" -eq 0 ]; then
            printf '\n===== cmake --build build =====\n' >> build-diagnostics.log
            cmake --build build --config Release --parallel 2 >> build-diagnostics.log 2>&1
            BUILD_STATUS=$?
          else
            BUILD_STATUS=1
          fi
          printf '\nbuild-status=%s\n' "$BUILD_STATUS" >> build-diagnostics.log
          echo "diagnostic-configure-status=$CONFIGURE_STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo "diagnostic-build-status=$BUILD_STATUS" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Upload build diagnostics
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: Zaid-FX-MOD-build-diagnostics
          path: build-diagnostics.log
          if-no-files-found: error

      - name: Fail after diagnostics
        if: steps.build.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Upload package
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: Zaid-FX-MOD-Android64
          path: ${{ steps.build.outputs.build-output }}/*.geode
          if-no-files-found: error

      - name: Publish versioned release
        if: steps.build.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="$(jq -r '.version' mod.json)"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; skipping."
            exit 0
          fi

          gh release create "$VERSION" \
            "${{ steps.build.outputs.build-output }}"/*.geode \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Zaid-FX-MOD $VERSION" \
            --notes-file changelog.md \
            --latest
