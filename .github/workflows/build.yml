name: Build Android64

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release metadata
        shell: bash
        run: |
          MOD_VERSION="$(jq -r '.version' mod.json)"
          CMAKE_VERSION="v$(sed -nE 's/^project\(ZaidFXMod VERSION ([0-9]+\.[0-9]+\.[0-9]+)\)$/\1/p' CMakeLists.txt)"

          test -n "$MOD_VERSION"
          test "$MOD_VERSION" = "$CMAKE_VERSION"
          grep -Fq "$MOD_VERSION" release-notes.md
          grep -Fq "$MOD_VERSION" changelog.md

      - name: Build Geode mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: given
          cli: latest
          target: Android64
          build-config: Release
          export-symbols: false

      - name: Prepare named package
        id: package
        shell: bash
        run: |
          VERSION="$(jq -r '.version' mod.json)"
          OUTPUT_DIR="${{ steps.build.outputs.build-output }}"
          SOURCE="$(find "$OUTPUT_DIR" -maxdepth 1 -type f -name '*.geode' -print -quit)"
          TARGET="$OUTPUT_DIR/Zaid.Fx.Mod-$VERSION.geode"

          test -n "$SOURCE"
          if [ "$SOURCE" != "$TARGET" ]; then
            mv "$SOURCE" "$TARGET"
          fi

          echo "path=$TARGET" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$TARGET")" >> "$GITHUB_OUTPUT"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: Zaid.Fx.Mod-${{ github.sha }}-Android64
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Publish versioned release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="$(jq -r '.version' mod.json)"
          PACKAGE="${{ steps.package.outputs.path }}"
          DESIRED_NAME="${{ steps.package.outputs.name }}"

          if gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$VERSION" "$PACKAGE" \
              --repo "${{ github.repository }}" \
              --clobber

            while IFS= read -r ASSET_NAME; do
              if [[ "$ASSET_NAME" == *.geode && "$ASSET_NAME" != "$DESIRED_NAME" ]]; then
                gh release delete-asset "$VERSION" "$ASSET_NAME" \
                  --repo "${{ github.repository }}" \
                  --yes
              fi
            done < <(
              gh release view "$VERSION" \
                --repo "${{ github.repository }}" \
                --json assets \
                --jq '.assets[].name'
            )
          else
            gh release create "$VERSION" "$PACKAGE" \
              --repo "${{ github.repository }}" \
              --target "${{ github.sha }}" \
              --title "Zaid-FX-MOD $VERSION" \
              --notes-file release-notes.md \
              --latest
          fi
