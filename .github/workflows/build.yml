name: Build Android64

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release metadata
        shell: bash
        run: |
          MOD_VERSION="$(jq -r '.version' mod.json)"
          CMAKE_VERSION="v$(sed -nE 's/^project\(ZaidFXMod VERSION ([0-9]+\.[0-9]+\.[0-9]+)\)$/\1/p' CMakeLists.txt)"

          test -n "$MOD_VERSION"
          test "$MOD_VERSION" = "$CMAKE_VERSION"
          grep -Fq "$MOD_VERSION" release-notes.md
          grep -Fq "$MOD_VERSION" changelog.md

      - name: Build Geode mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: given
          cli: latest
          target: Android64
          build-config: Release
          export-symbols: false

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: Zaid-FX-MOD-Android64
          path: ${{ steps.build.outputs.build-output }}/*.geode
          if-no-files-found: error

      - name: Publish versioned release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="$(jq -r '.version' mod.json)"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; skipping."
            exit 0
          fi

          gh release create "$VERSION" \
            "${{ steps.build.outputs.build-output }}"/*.geode \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Zaid-FX-MOD $VERSION" \
            --notes-file release-notes.md \
            --latest
